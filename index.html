<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analyses Linéaires · Bac de Français</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ===== SIDEBAR ===== -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">
      <span class="logo-icon">✦</span>
      <div>
        <div class="logo-title">Analyses Linéaires</div>
        <div class="logo-sub">Bac de Français</div>
      </div>
    </div>
    <button class="sidebar-close" id="sidebarClose" aria-label="Fermer le menu">✕</button>
  </div>

  <div class="sidebar-search">
    <input type="text" id="searchInput" placeholder="Rechercher un texte…" autocomplete="off">
    <span class="search-icon">⌕</span>
  </div>

  <nav class="sidebar-nav" id="sidebarNav">
    <!-- Dynamically populated -->
    <div class="nav-loading">Chargement…</div>
  </nav>

  <div class="sidebar-footer">
    <button class="btn-add-oeuvre" id="btnAddOeuvre">
      <span>+</span> Ajouter une œuvre
    </button>
    <button class="theme-toggle" id="themeToggle">🌙</button>
  </div>
</aside>

<!-- ===== OVERLAY ===== -->
<div class="overlay" id="overlay"></div>

<!-- ===== MAIN ===== -->
<main class="main" id="main">
  <header class="topbar">
    <button class="menu-btn" id="menuBtn" aria-label="Menu">☰</button>
    <div class="topbar-breadcrumb" id="breadcrumb">Accueil</div>
    <div class="topbar-actions">
      <button class="btn-secondary" id="btnPrint">⎙ Imprimer</button>
    </div>
  </header>

  <div class="content" id="content">
    <!-- Dynamically populated -->
    <div class="home-screen">
      <div class="home-hero">
        <div class="hero-badge">Baccalauréat · Français</div>
        <h1>Livret d'<em>Études</em><br>Linéaires</h1>
        <p class="hero-sub">Retrouve tes analyses, surligne les textes, ajoute tes propres observations.</p>
      </div>
      <div class="home-oeuvres" id="homeOeuvres">
        <div class="loading-spinner"></div>
      </div>
    </div>
  </div>
</main>

<!-- ===== MODALS ===== -->

<!-- Modal: Ajouter une œuvre -->
<div class="modal" id="modalOeuvre">
  <div class="modal-box">
    <div class="modal-header">
      <h3>Nouvelle œuvre</h3>
      <button class="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <label>Auteur <span class="req">*</span></label>
      <input type="text" id="oeuvreAuteur" placeholder="ex: Arthur Rimbaud">
      <label>Titre <span class="req">*</span></label>
      <input type="text" id="oeuvreTitre" placeholder="ex: Les Cahiers de Douai">
      <label>Sous-titre</label>
      <input type="text" id="oeuvreSoustitre" placeholder="ex: Recueil de poèmes, 1870">
      <label>Mouvement littéraire</label>
      <input type="text" id="oeuvreMouvement" placeholder="ex: Parnasse / Symbolisme naissant">
      <label>Couleur thème</label>
      <div class="color-picker-row">
        <input type="color" id="oeuvreCouleur1" value="#1a3a2a">
        <span>→</span>
        <input type="color" id="oeuvreCouleur2" value="#2d7a4a">
        <span class="color-hint">(gradient de l'en-tête)</span>
      </div>
      <label>Mots-clés <span class="hint">(séparés par des virgules)</span></label>
      <input type="text" id="oeuvreMots" placeholder="ex: Révolte, Nature, Poésie pure">
      <label>Enjeu principal</label>
      <textarea id="oeuvreEnjeu" rows="3" placeholder="Description de l'enjeu de l'œuvre…"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel modal-close-btn">Annuler</button>
      <button class="btn-primary" id="saveOeuvre">Créer l'œuvre</button>
    </div>
  </div>
</div>

<!-- Modal: Ajouter un texte -->
<div class="modal" id="modalTexte">
  <div class="modal-box">
    <div class="modal-header">
      <h3>Nouveau texte</h3>
      <button class="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <label>Titre du texte <span class="req">*</span></label>
      <input type="text" id="texteTitre" placeholder="ex: Acte I, scène 1 (v. 1-21)">
      <label>Introduction / contexte</label>
      <textarea id="texteIntro" rows="3" placeholder="Résumé du contexte littéraire de cet extrait…"></textarea>
      <label>Contexte (mot-clé court)</label>
      <input type="text" id="texteContexte" placeholder="ex: Scène d'exposition">
      <label>Enjeu (mot-clé court)</label>
      <input type="text" id="texteEnjeu" placeholder="ex: Présentation du héros">
      <label>Problématique</label>
      <input type="text" id="texteProblematique" placeholder="ex: En quoi cette scène…">
      <label>Texte intégral</label>
      <textarea id="texteIntegral" rows="10" placeholder="Colle ici le texte intégral de l'extrait…"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel modal-close-btn">Annuler</button>
      <button class="btn-primary" id="saveTexte">Ajouter le texte</button>
    </div>
  </div>
</div>

<!-- Modal: Ajouter une analyse -->
<div class="modal" id="modalAnalyse">
  <div class="modal-box modal-box--wide">
    <div class="modal-header">
      <h3>Nouvelle analyse de procédé</h3>
      <button class="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <div class="analyse-form-grid">
        <div>
          <label>Mouvement <span class="req">*</span></label>
          <select id="analyseMouvement">
            <option value="1">Mouvement 1 (bleu)</option>
            <option value="2">Mouvement 2 (vert)</option>
            <option value="3">Mouvement 3 (orange)</option>
            <option value="4">Mouvement 4 (violet)</option>
          </select>
        </div>
        <div>
          <label>Numéro dans le mouvement</label>
          <input type="number" id="analyseNumero" value="1" min="1" max="6">
        </div>
      </div>
      <label>Citation <span class="req">*</span></label>
      <input type="text" id="analyseCitation" placeholder="ex: « les crachats rouges de la mitraille »">
      <label>Référence <span class="hint">(vers, ligne…)</span></label>
      <input type="text" id="analyseRef" placeholder="ex: (v. 1)">
      <label>Procédé littéraire <span class="req">*</span></label>
      <input type="text" id="analyseProcede" placeholder="ex: métaphore organique hideuse">
      <label>Analyse complète <span class="req">*</span></label>
      <textarea id="analyseTexte" rows="4" placeholder="Rédige ton analyse du procédé et de son effet…"></textarea>
      <div class="preview-box" id="analysePreview"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel modal-close-btn">Annuler</button>
      <button class="btn-primary" id="saveAnalyse">Ajouter l'analyse</button>
    </div>
  </div>
</div>

<!-- Modal: Ajouter un mouvement -->
<div class="modal" id="modalMouvement">
  <div class="modal-box">
    <div class="modal-header">
      <h3>Nouveau mouvement</h3>
      <button class="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <label>Titre du mouvement <span class="req">*</span></label>
      <input type="text" id="mouvementTitre" placeholder="ex: L'horreur aveugle et mécanique">
      <label>Vers / lignes concernées</label>
      <input type="text" id="mouvementVers" placeholder="ex: v. 1-4">
    </div>
    <div class="modal-footer">
      <button class="btn-cancel modal-close-btn">Annuler</button>
      <button class="btn-primary" id="saveMouvement">Créer le mouvement</button>
    </div>
  </div>
</div>

<!-- Edit Mode FAB -->
<button class="edit-toggle-fab no-print" id="editToggle">✏️ Modifier</button>

<!-- Scripts -->
<script type="module" src="js/firebase-config.js"></script>
<script type="module" src="js/data.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
